name: CI – Pull Request para main

on:
  pull_request:
    branches:
      - main

jobs:
  api-unit-tests:
    name: Testes Unitários – API (Maven / H2)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven

      - name: Executar testes Maven
        working-directory: api
        run: |
          chmod +x mvnw
          ./mvnw test --batch-mode

  client-unit-tests:
    name: Testes Unitários – Client (Jest)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Instalar dependências do client
        working-directory: client
        run: npm ci

      - name: Executar testes Jest
        working-directory: client
        run: npm test -- --ci --passWithNoTests

  e2e-tests:
    name: Testes E2E – Playwright (Stack Completa)
    runs-on: ubuntu-latest
    needs: [api-unit-tests, client-unit-tests]

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: sqa_media
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven

      - name: Compilar a API
        working-directory: api
        run: |
          chmod +x mvnw
          ./mvnw package -DskipTests --batch-mode

      - name: Iniciar a API em background
        working-directory: api
        run: |
          nohup java -jar target/*.jar \
            --spring.datasource.url=jdbc:mysql://localhost:3306/sqa_media \
            --spring.datasource.username=root \
            --spring.datasource.password=root \
            --spring.jpa.hibernate.ddl-auto=update \
            > /tmp/api.log 2>&1 &

      - name: Configurar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Instalar dependências do client
        working-directory: client
        run: npm ci

      - name: Build do client Next.js
        working-directory: client
        run: npm run build

      - name: Iniciar o client em background
        working-directory: client
        run: nohup npm start > /tmp/client.log 2>&1 &

      - name: Aguardar a API estar disponível
        run: |
          for i in $(seq 1 30); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              -X POST http://localhost:8080/auth/signin \
              -H "Content-Type: application/json" \
              -d '{"email":"health@check.com","password":"x"}' || echo "000")
            if [ "$STATUS" != "000" ]; then
              break
            fi
            sleep 3
          done

      - name: Aguardar o client estar disponível
        run: |
          for i in $(seq 1 30); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000 || echo "000")
            if [ "$STATUS" = "200" ] || [ "$STATUS" = "304" ]; then
              break
            fi
            sleep 3
          done

      - name: Instalar dependências dos testes
        working-directory: tests
        run: npm ci

      - name: Instalar Chromium para Playwright
        working-directory: tests
        run: npx playwright install --with-deps chromium

      - name: Executar testes Playwright
        working-directory: tests
        run: npm test

      - name: Upload do relatório Playwright
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: tests/playwright-report/
          retention-days: 7
